<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rock Papper Scissor game</title>

	<!-- Links group -->
	<link rel="stylesheet" href="../dist/output.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <!-- Links group -->
</head>


<body class="bg-[url('../Images/Gamebg.jpg')] bg-cover bg-no-repeat bg-blend-multiply bg-slate-700 min-h-screen flex flex-col">
	<h1 class="font-pixel text-white text-sm md:text-5xl text-center capitalize py-4">
        Rock Papper Scissor game
    </h1>

    <section class="group bg-slate-800/50 backdrop-blur-lg border border-slate-600 max-w-7xl mx-auto md:w-200 p-8 rounded-4xl shadow-2xl transition-all duration-300 hover:border-orange-500/50 hover:shadow-orange-500/10 relative overflow-hidden">
    <div class="absolute -top-10 -left-10 w-40 h-40 bg-orange-500/10 rounded-full"></div>
    
    <div class="relative z-10 flex flex-col gap-6">
        <div class="space-y-2 text-center">
            <h2 id="display-pemenang" class="font-pixel text-xl text-orange-400 tracking-wider">Batu Gunting Kertas</h2>
            <p id="skor-suit" class="font-mono text-slate-400 text-xs uppercase tracking-widest">
                skor kamu: <span id="angka-skor" class="font-pixel">0</span>
                skor komputer: <span id="angka-komputer" class="font-pixel">0</span>
                seri: <span id="seri-skor" class="font-pixel">0</span>
            </p>
        </div>

        <div class="flex justify-around items-center bg-slate-900/60 p-4 rounded-2xl border border-slate-700 min-h-25">
            <div class="text-center">
                <p class="text-[10px] text-slate-500 uppercase mb-1">Kamu</p>
                <div id="pilihan-user" class="text-3xl text-white font-pixel">?</div>
            </div>
            <div class="text-orange-500 font-pixel text-xl animate-pulse">VS</div>
            <div class="text-center">
                <p class="text-[10px] text-slate-500 uppercase mb-1">Komputer</p>
                <div id="pilihan-komputer" class="text-3xl text-white font-pixel">?</div>
            </div>
        </div>

        <p id="hasil-duel" class="text-center font-pixel text-slate-200 min-h-6 text-sm">Pilih senjata kamu!</p>

        <div class="flex flex-wrap gap-2">
            <button class="btn-suit flex-1 py-3 bg-slate-700 hover:bg-orange-500 hover:text-slate-900 text-white rounded-xl font-pixel transition-all active:scale-95 cursor-pointer" data-pilihan="batu">
                Batu
            </button>
            <button class="btn-suit flex-1 py-3 bg-slate-700 hover:bg-orange-500 hover:text-slate-900 text-white rounded-xl font-pixel transition-all active:scale-95 cursor-pointer" data-pilihan="gunting">
                Gunting
            </button>
            <button class="btn-suit flex-1 py-3 bg-slate-700 hover:bg-orange-500 hover:text-slate-900 text-white rounded-xl font-pixel transition-all active:scale-95 cursor-pointer" data-pilihan="kertas">
                Kertas
            </button>
        </div>
        
        <button id="reset-suit" class="w-full py-2 text-xs border border-slate-700 text-slate-500 hover:bg-slate-700 hover:text-slate-300 rounded-lg font-pixel transition-all cursor-pointer                               active:scale-95">
            Reset Score
        </button>

        <p class="font-pixel text-sm md:text-xl text-orange-500">Nyawa: <span id="nyawa-user">7</span></p>
    </div>
</section>


<!-- Tombol back to home -->
    <div class="flex justify-center px-6 pb-8 mt-10">
        <a href="../index.html">
            <button id="start-btn" class="relative group focus:outline-none transition duration-100 active:translate-y-1 cursor-pointer">
                <div class="absolute -inset-1.5 bg-slate-950 rounded-none border-t-0 border-l-0"></div>
                <div class="absolute -inset-0.5 bg-cyan-400 rounded-none border-t-0 border-l-0"></div>
                <div class="relative bg-slate-900 px-6 py-3 rounded-none border-2 border-slate-950 
                    border-t-cyan-100 border-l-cyan-100 
                    border-b-cyan-600 border-r-cyan-600">
                    <span class="font-pixel text-lg text-cyan-100 tracking-wider group-hover:text-cyan-400 transition-colors">
                        BACK TO HOME
                    </span>
                </div>
            </button>
        </a>
    </div>

<script src="../Javascript/rock-paper.js"></script>
</body>
</html>
