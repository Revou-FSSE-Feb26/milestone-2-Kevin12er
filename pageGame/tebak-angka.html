<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Guess the number game</title>
	<!-- Links group -->
	<link rel="stylesheet" href="../dist/output.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <!-- Links group -->
</head>

<body class="bg-[url('../Images/Gamebg.jpg')] bg-cover bg-no-repeat bg-blend-multiply bg-slate-700 min-h-screen flex flex-col">
	<h1 class="font-pixel text-white text-sm md:text-5xl text-center capitalize py-4">
        Guess the number game
    </h1>
	
	<section class="group bg-slate-800/50 backdrop-blur-lg border border-slate-600 max-w-7xl mx-auto md:w-200 md:mt-20 p-8 rounded-4xl shadow-2xl transition-all duration-300 hover:border-lime-500/50 hover:shadow-lime-500/10 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-lime-500/10 rounded-full blur-3xl"></div>
        
        <div class="relative z-10 flex flex-col gap-6">
            <div class="space-y-2">
                <h2 id="pesan-game" class="font-pixel text-xl text-lime-400 text-center tracking-wider drop-shadow-sm">Menunggu game dimulai....</h2>
                <p id="display-nyawa" class="text-center font-mono text-slate-400 text-xs md:text-sm uppercase tracking-widest"></p>
            </div>

            <div class="relative">
                <input type="tel" placeholder="1 sampai 20" id="inputTebakan"
                    class="w-full bg-slate-900/50 border-2 border-slate-600 rounded-xl text-white p-4 outline-none focus:border-lime-500 transition-all duration-300 font-pixel text-center text-2xl placeholder:text-slate-600 placeholder:text-sm">
            </div>

            <p id="clueNumber" class="text-center text-sm text-slate-300 min-h-6"></p>

            <div class="flex flex-col gap-3 md:flex-row">
                <button id="btn-tebak" 
                    class="flex-1 py-3 bg-lime-500 hover:bg-lime-400 text-slate-900 rounded-xl font-pixel font-bold shadow-lg shadow-lime-500/20 transform transition active:scale-95 cursor-pointer">
                    Tebak!
                </button>
            
                <button id="reset-button"
                    class="flex-1 py-3 border-2 border-slate-600 text-slate-300 hover:bg-slate-700 rounded-xl font-pixel transform transition active:scale-95 cursor-pointer">
                    Reset
                </button>
            </div>
        </div>
    </section>        



    <!-- Tombol back to home -->
    <div class="flex justify-center px-6 pb-8 mt-10">
        <a href="pageGame/pageGame.html">
            <button id="start-btn" class="relative group focus:outline-none transition duration-100 active:translate-y-1 cursor-pointer">
                <div class="absolute -inset-1.5 bg-slate-950 rounded-none border-t-0 border-l-0"></div>
                <div class="absolute -inset-0.5 bg-cyan-400 rounded-none border-t-0 border-l-0"></div>
                <div class="relative bg-slate-900 px-6 py-3 rounded-none border-2 border-slate-950 
                    border-t-cyan-100 border-l-cyan-100 
                    border-b-cyan-600 border-r-cyan-600">
                    <span class="font-pixel text-lg text-cyan-100 tracking-wider group-hover:text-cyan-400 transition-colors">
                        BACK TO HOME
                    </span>
                </div>
            </button>
        </a>
    </div>




<script src="../Javascript/tebak-angka.js"></script>
</body>
</html>
