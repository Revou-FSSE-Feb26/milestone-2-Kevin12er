<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing game</title>
    <link rel="stylesheet" href="../dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body class="bg-cover bg-no-repeat bg-blend-multiply bg-slate-700 min-h-screen flex flex-col">

    <h1 class="font-pixel text-white text-sm md:text-5xl text-center capitalize py-4">
        Typing Game
    </h1>

    <section class="group bg-slate-800/50 backdrop-blur-lg border border-slate-600 w-[90%] max-w-7xl mx-auto p-8 rounded-4xl shadow-2xl transition-all my-10 duration-300 hover:border-cyan-500/50 hover:shadow-cyan-500/10 relative overflow-hidden">
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-cyan-500/10 rounded-full"></div>

        <div class="relative h-full flex flex-col justify-between gap-8">
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-slate-700 pb-4">
                    <label for="papan-ketik" class="font-pixel text-lg text-cyan-400 tracking-tight">Speed Test</label>
                    <span id="skor-ketik" class="text-xl text-white font-pixel bg-slate-700/50 px-4 py-1 rounded-full border border-slate-600">Skor: 0</span>
                </div>

                <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-700/50 italic">
                    <h3 id="text-display" class="text-slate-300 text-lg leading-relaxed first-letter:text-3xl first-letter:font-bold first-letter:text-cyan-400"></h3>
                </div>

                <div class="relative">
                    <input type="text" placeholder="Ketik kalimat di atas..." id="papan-ketik"
                        class="w-full bg-slate-900/50 border-2 border-slate-600 rounded-xl p-4 text-white outline-none focus:border-cyan-500 transition-all duration-300 font-sans text-lg">
                </div>
            </div>

            <div class="flex items-center justify-between mt-4">
                <div class="flex items-center gap-3 bg-slate-700/30 px-4 py-2 rounded-xl">
                    <svg class="animate-pulse" xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 640 640">
                        <path fill="rgb(34, 211, 238)" d="M528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112C434.9 112 528 205.1 528 320zM64 320C64 461.4 178.6 576 320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320zM296 184L296 320C296 328 300 335.5 306.7 340L402.7 404C413.7 411.4 428.6 408.4 436 397.3C443.4 386.2 440.4 371.4 429.3 364L344 307.2L344 184C344 170.7 333.3 160 320 160C306.7 160 296 170.7 296 184z"/>
                    </svg>
                    <span id="second-count" class="text-cyan-400 text-3xl font-pixel">00:00</span>
                </div>

                <button id="resetWord-btn" 
                    class="px-6 py-2 border-2 border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white rounded-xl font-pixel transition-all active:scale-95 cursor-pointer">
                    Start
                </button>
            </div>
        </div>
    </section>

    <!-- Tombol back to home -->
    <div class="flex justify-center px-6 pb-8">
        <a href="../index.html">
            <button id="start-btn" class="relative group focus:outline-none transition duration-100 active:translate-y-1 cursor-pointer">
                <div class="absolute -inset-1.5 bg-slate-950 rounded-none border-t-0 border-l-0"></div>
                <div class="absolute -inset-0.5 bg-cyan-400 rounded-none border-t-0 border-l-0"></div>
                <div class="relative bg-slate-900 px-6 py-3 rounded-none border-2 border-slate-950 
                    border-t-cyan-100 border-l-cyan-100 
                    border-b-cyan-600 border-r-cyan-600">
                    <span class="font-pixel text-lg text-cyan-100 tracking-wider group-hover:text-cyan-400 transition-colors">
                        BACK TO HOME
                    </span>
                </div>
            </button>
        </a>
    </div>

    <script src="../Javascript/game-ketik.js"></script>
</body>
</html>
