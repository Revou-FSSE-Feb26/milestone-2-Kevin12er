<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Whack a mole game</title>

	<!-- Links group -->
	<link rel="stylesheet" href="../dist/output.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">

<body class="bg-[url('../Images/Gamebg.jpg')] bg-cover bg-no-repeat bg-blend-multiply bg-slate-700 min-h-screen flex flex-col">
	<h1 class="font-pixel text-white text-sm md:text-5xl text-center capitalize py-4">
        Whack a mole game
   	</h1>

   	<section class="group bg-slate-800/50 backdrop-blur-lg border border-slate-600 max-w-7xl mx-auto md:w-200 md:mt-20 p-8 rounded-4xl shadow-2xl transition-all duration-300 hover:border-lime-500/50 hover:shadow-orange-500/10 relative overflow-hidden">
        <div class="flex gap-4 justify-between">
            <h1 class="font-pixel text-sm md:text-xl text-lime-500">Whack a mole</h1>

            <p id="display-whack" class="font-pixel text-sm md:text-xl text-lime-500"></p>

            <p class="font-pixel text-sm md:text-xl text-black p-2 rounded-2xl bg-lime-500">Skor:<span id="skor-whack-mole">0</span></p>


        </div>

        <div class="grid grid-cols-3 grid-row-3 gap-2 place-items-center my-4">
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
            <figure class="w-25 h-25 rounded-full bg-slate-700 object-fit overflow-hidden cursor-pointer active:scale-95">
                <img class="mole transition transform duration-200 translate-y-full" src="../Images/ratvector.jpeg" alt="mouse">
            </figure>
        </div>

        <div class="flex items-center justify-between mt-4">
                <div class="flex items-center gap-3 bg-slate-700/30 px-4 py-2 rounded-xl">
                    <svg class="animate-pulse" xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 640 640">
                        <path fill="rgb(205, 220, 57)" d="M528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112C434.9 112 528 205.1 528 320zM64 320C64 461.4 178.6 576 320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320zM296 184L296 320C296 328 300 335.5 306.7 340L402.7 404C413.7 411.4 428.6 408.4 436 397.3C443.4 386.2 440.4 371.4 429.3 364L344 307.2L344 184C344 170.7 333.3 160 320 160C306.7 160 296 170.7 296 184z"/>
                    </svg>
                    <span id="whack-count" class="text-lime-500 text-3xl font-pixel">00:00</span>
                </div>

                <button id="start-whack-btn" 
                    class="px-6 py-2 border-2 border-slate-600 text-slate-300 hover:text-black hover:bg-lime-500 rounded-xl font-pixel transition-all active:scale-95 cursor-pointer">
                    Start
                </button>
            </div>

    </section>


        <!-- Tombol back to home -->
    <div class="flex justify-center px-6 pb-8 mt-10">
        <a href="../index.html">
            <button id="start-btn" class="relative group focus:outline-none transition duration-100 active:translate-y-1 cursor-pointer">
                <div class="absolute -inset-1.5 bg-slate-950 rounded-none border-t-0 border-l-0"></div>
                <div class="absolute -inset-0.5 bg-cyan-400 rounded-none border-t-0 border-l-0"></div>
                <div class="relative bg-slate-900 px-6 py-3 rounded-none border-2 border-slate-950 
                    border-t-cyan-100 border-l-cyan-100 
                    border-b-cyan-600 border-r-cyan-600">
                    <span class="font-pixel text-lg text-cyan-100 tracking-wider group-hover:text-cyan-400 transition-colors">
                        BACK TO HOME
                    </span>
                </div>
            </button>
        </a>
    </div>
